name: Weekly Backtest System

on:
  push:
    branches: [ "main" ] # push時にも動くようにして動作確認しやすくします
  workflow_dispatch:      # 手動実行ボタンも残します

env:
  # Node.js 20の非推奨警告への対応 (2025-2026年推奨設定)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-system:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 成果物をリポジトリに書き戻す必要がある場合に備え

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # cache: 'pip' を削除し、requirements.txt不在によるエラーを回避
        
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas pyarrow fastparquet numpy yfinance jquants-api-client

      - name: Execute Pipeline
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          # フォルダ作成
          mkdir -p Colog_github
          
          if [ -z "$JQUANTS_API_KEY" ]; then
            echo "Error: JQUANTS_API_KEY is not set in GitHub Secrets."
            exit 1
          fi
          
          # 1. データ取得（小型株スクリーニング含む）
          python -u data_fetcher.py
          
          # 2. 統合バックテスト実行
          python -u backtest_runner.py

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            Colog_github/*.parquet
            Colog_github/*.txt
            Colog_github/*.csv
            backtest_report.csv
